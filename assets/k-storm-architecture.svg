<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" font-family="Inter, 'SF Pro Display', 'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#D8E9FF" stop-opacity="0.70"/>
      <stop offset="55%" stop-color="#EAF4FF" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5FAFF"/><stop offset="100%" stop-color="#E8F2FF"/>
    </linearGradient>
    <linearGradient id="greenSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5FFF9"/><stop offset="100%" stop-color="#E8F8EF"/>
    </linearGradient>
    <linearGradient id="purpleSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCF7FF"/><stop offset="100%" stop-color="#F1E8FF"/>
    </linearGradient>
    <linearGradient id="orangeSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F0"/><stop offset="100%" stop-color="#FFEDCF"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF4FF"/><stop offset="100%" stop-color="#FFF6E8"/>
    </linearGradient>
    <linearGradient id="strokeBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F7FD9"/><stop offset="100%" stop-color="#21B7C8"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#4F7FD9"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#253041"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#2E9A55"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#9B5CD6"/>
    </marker>
    <style>
      .title { font-size: 30px; font-weight: 850; fill: #111827; letter-spacing: 0.6px; }
      .subtitle { font-size: 12px; fill: #697586; letter-spacing: 1.6px; text-transform: uppercase; }
      .section { font-size: 18px; font-weight: 800; fill: #172033; letter-spacing: 0.2px; }
      .sectionSmall { font-size: 11px; fill: #667085; letter-spacing: 0.6px; }
      .nodeTitle { font-size: 13.5px; font-weight: 750; fill: #172033; }
      .nodeSub { font-size: 10.5px; fill: #667085; }
      .body { font-size: 12.5px; fill: #3F4754; }
      .bodySmall { font-size: 11.5px; fill: #596579; }
      .tiny { font-size: 10px; fill: #778296; }
      .blueFlow { stroke: #4F7FD9; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
      .darkFlow { stroke: #253041; stroke-width: 2; fill: none; marker-end: url(#arrowDark); }
      .greenFlow { stroke: #2E9A55; stroke-width: 2; fill: none; marker-end: url(#arrowGreen); }
      .purpleFlow { stroke: #9B5CD6; stroke-width: 2; fill: none; marker-end: url(#arrowPurple); }
      .dashFlow { stroke: #6A8FE8; stroke-width: 2; fill: none; stroke-dasharray: 9 7; marker-end: url(#arrowBlue); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#FFFFFF"/>
  <circle cx="800" cy="510" r="410" fill="url(#halo)"/>
  <path d="M90 118H1510" stroke="#E8EDF5" stroke-width="1.2"/>

  <!-- Header -->
  <text x="800" y="52" text-anchor="middle" class="title">K-Storm Architecture</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">LOCAL-FIRST MULTI-AGENT RESEARCH BRAINSTORMING SYSTEM</text>

  <!-- LEFT: Research Console -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="158" width="315" height="238" rx="18" fill="url(#blueSoft)" stroke="#8FB4EA" stroke-width="1.8"/>
    <rect x="70" y="158" width="315" height="4" rx="2" fill="url(#strokeBlue)"/>
    <text x="228" y="198" text-anchor="middle" class="section">Research Console</text>
    <text x="228" y="220" text-anchor="middle" class="sectionSmall">REACT + VITE FRONTEND</text>

    <!-- small screen glyph -->
    <rect x="190" y="236" width="76" height="42" rx="7" fill="#FFFFFF" stroke="#7FA7E8" stroke-width="1.4"/>
    <line x1="202" y1="250" x2="254" y2="250" stroke="#4F7FD9" stroke-width="2" opacity="0.45"/>
    <line x1="202" y1="262" x2="238" y2="262" stroke="#4F7FD9" stroke-width="2" opacity="0.28"/>
    <line x1="216" y1="286" x2="240" y2="286" stroke="#4F7FD9" stroke-width="2"/>

    <rect x="100" y="304" width="255" height="38" rx="10" fill="#FFFFFF" stroke="#AFC8EF" stroke-width="1.4"/>
    <text x="228" y="328" text-anchor="middle" class="body">Template Form</text>

    <rect x="100" y="354" width="255" height="38" rx="10" fill="#FFFFFF" stroke="#AFC8EF" stroke-width="1.4"/>
    <text x="228" y="378" text-anchor="middle" class="body">Documents / Notes</text>
  </g>

  <!-- LEFT LOWER: Workspace Views -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="442" width="315" height="200" rx="18" fill="#FBFCFF" stroke="#D5DAE2" stroke-width="1.8"/>
    <rect x="70" y="442" width="315" height="4" rx="2" fill="#A7B0BF"/>
    <text x="228" y="482" text-anchor="middle" class="section">Workspace Views</text>
    <rect x="102" y="512" width="252" height="32" rx="8" fill="#F6F8FB" stroke="#E1E6EF"/>
    <text x="228" y="533" text-anchor="middle" class="bodySmall">New Discussion</text>
    <rect x="102" y="552" width="252" height="32" rx="8" fill="#F6F8FB" stroke="#E1E6EF"/>
    <text x="228" y="573" text-anchor="middle" class="bodySmall">Debate Floor</text>
    <rect x="102" y="592" width="252" height="32" rx="8" fill="#F6F8FB" stroke="#E1E6EF"/>
    <text x="228" y="613" text-anchor="middle" class="bodySmall">Report / History / References</text>
  </g>

  <!-- LEFT BOTTOM: Model Providers -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="706" width="315" height="178" rx="18" fill="url(#purpleSoft)" stroke="#D3C3F5" stroke-width="1.8"/>
    <rect x="70" y="706" width="315" height="4" rx="2" fill="#9B5CD6"/>
    <text x="228" y="746" text-anchor="middle" class="section">Model Providers</text>
    <text x="228" y="775" text-anchor="middle" class="bodySmall">OpenAI Compatible</text>
    <text x="228" y="804" text-anchor="middle" class="bodySmall">Anthropic Messages</text>
    <text x="228" y="833" text-anchor="middle" class="bodySmall">OpenAI Responses</text>
    <text x="228" y="862" text-anchor="middle" class="bodySmall">Local Mock Provider</text>
  </g>

  <!-- CENTER TOP: Orchestration Core -->
  <g filter="url(#cardShadow)">
    <rect x="500" y="156" width="600" height="222" rx="20" fill="#FFFFFF" stroke="#CDD5E1" stroke-width="1.8"/>
    <rect x="500" y="156" width="600" height="4" rx="2" fill="url(#strokeBlue)"/>
    <text x="800" y="197" text-anchor="middle" class="section">Orchestration Core</text>
    <text x="800" y="220" text-anchor="middle" class="sectionSmall">FASTAPI · STATE MACHINE · MODEL ROUTING</text>

    <rect x="535" y="266" width="160" height="54" rx="12" fill="url(#greenSoft)" stroke="#A8D79A" stroke-width="1.6"/>
    <text x="615" y="291" text-anchor="middle" class="nodeTitle">API Layer</text>
    <text x="615" y="309" text-anchor="middle" class="nodeSub">runs / history</text>

    <rect x="720" y="266" width="160" height="54" rx="12" fill="url(#orangeSoft)" stroke="#F0B46D" stroke-width="1.6"/>
    <text x="800" y="291" text-anchor="middle" class="nodeTitle">Run Scheduler</text>
    <text x="800" y="309" text-anchor="middle" class="nodeSub">state machine</text>

    <rect x="905" y="266" width="160" height="54" rx="12" fill="url(#purpleSoft)" stroke="#C68BE2" stroke-width="1.6"/>
    <text x="985" y="291" text-anchor="middle" class="nodeTitle">Model Router</text>
    <text x="985" y="309" text-anchor="middle" class="nodeSub">per-agent</text>

    <path d="M615 320V346H800V320" stroke="#A7B0BF" stroke-width="1.5" fill="none"/>
    <path d="M985 320V346H800" stroke="#A7B0BF" stroke-width="1.5" fill="none"/>
  </g>

  <!-- MAIN: Agent Deliberation Ring -->
  <g filter="url(#cardShadow)">
    <rect x="455" y="448" width="690" height="300" rx="20" fill="#FFFFFF" stroke="#CDD5E1" stroke-width="1.8"/>
    <rect x="455" y="448" width="690" height="4" rx="2" fill="#F0B46D"/>
    <text x="800" y="490" text-anchor="middle" class="section">Agent Deliberation Ring</text>
    <text x="800" y="513" text-anchor="middle" class="sectionSmall">PARALLEL FIRST ROUND · SERIAL REFINEMENT · COMPACT IR</text>

    <!-- core -->
    <circle cx="800" cy="612" r="66" fill="url(#coreGrad)" stroke="#F0B46D" stroke-width="2"/>
    <circle cx="800" cy="612" r="46" fill="#FFFFFF" stroke="#F2CC8D" stroke-width="1.2"/>
    <text x="800" y="608" text-anchor="middle" class="nodeTitle">Debate</text>
    <text x="800" y="628" text-anchor="middle" class="nodeTitle">Core</text>

    <!-- agents -->
    <rect x="500" y="540" width="188" height="62" rx="13" fill="url(#blueSoft)" stroke="#93B6EA" stroke-width="1.8"/>
    <text x="594" y="567" text-anchor="middle" class="nodeTitle">Novelty Agent</text>
    <text x="594" y="586" text-anchor="middle" class="nodeSub">new directions</text>

    <rect x="912" y="540" width="188" height="62" rx="13" fill="url(#purpleSoft)" stroke="#C68BE2" stroke-width="1.8"/>
    <text x="1006" y="567" text-anchor="middle" class="nodeTitle">Mechanism Agent</text>
    <text x="1006" y="586" text-anchor="middle" class="nodeSub">causal chain</text>

    <rect x="500" y="648" width="188" height="62" rx="13" fill="url(#greenSoft)" stroke="#A8D79A" stroke-width="1.8"/>
    <text x="594" y="675" text-anchor="middle" class="nodeTitle">Feasibility Agent</text>
    <text x="594" y="694" text-anchor="middle" class="nodeSub">experiment cost</text>

    <rect x="912" y="648" width="188" height="62" rx="13" fill="url(#orangeSoft)" stroke="#F0B46D" stroke-width="1.8"/>
    <text x="1006" y="675" text-anchor="middle" class="nodeTitle">Reviewer Agent</text>
    <text x="1006" y="694" text-anchor="middle" class="nodeSub">critique / risk</text>

    <!-- ring lines, behind center feel -->
    <path d="M688 571C724 550 758 542 800 548C842 542 876 550 912 571" stroke="#A7B0BF" stroke-width="1.4" fill="none"/>
    <path d="M688 679C724 700 758 708 800 700C842 708 876 700 912 679" stroke="#A7B0BF" stroke-width="1.4" fill="none"/>
    <line x1="688" y1="571" x2="740" y2="596" stroke="#A7B0BF" stroke-width="1.4"/>
    <line x1="912" y1="571" x2="860" y2="596" stroke="#A7B0BF" stroke-width="1.4"/>
    <line x1="688" y1="679" x2="740" y2="628" stroke="#A7B0BF" stroke-width="1.4"/>
    <line x1="912" y1="679" x2="860" y2="628" stroke="#A7B0BF" stroke-width="1.4"/>
  </g>

  <!-- RIGHT: Artifact Pipeline -->
  <g filter="url(#cardShadow)">
    <rect x="1220" y="156" width="310" height="592" rx="20" fill="#FFF8FC" stroke="#D77BD5" stroke-width="1.8"/>
    <rect x="1220" y="156" width="310" height="4" rx="2" fill="#C85BD4"/>
    <text x="1375" y="197" text-anchor="middle" class="section">Artifact Pipeline</text>
    <text x="1375" y="220" text-anchor="middle" class="sectionSmall">DISCUSSION → REPORT</text>

    <rect x="1255" y="276" width="240" height="46" rx="11" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.7"/>
    <text x="1375" y="304" text-anchor="middle" class="body">Moderator Summary</text>

    <rect x="1255" y="356" width="240" height="46" rx="11" fill="#F3E8FF" stroke="#C68BE2" stroke-width="1.7"/>
    <text x="1375" y="384" text-anchor="middle" class="body">IR Summaries</text>

    <rect x="1255" y="436" width="240" height="62" rx="11" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.7"/>
    <text x="1375" y="461" text-anchor="middle" class="body">Structured IR</text>
    <text x="1375" y="481" text-anchor="middle" class="tiny">consensus · conflict · evidence</text>

    <rect x="1255" y="532" width="240" height="46" rx="11" fill="#FFEBCB" stroke="#F0B46D" stroke-width="1.7"/>
    <text x="1375" y="560" text-anchor="middle" class="body">Evidence Check</text>

    <rect x="1255" y="612" width="240" height="46" rx="11" fill="#F3E8FF" stroke="#C68BE2" stroke-width="1.7"/>
    <text x="1375" y="640" text-anchor="middle" class="body">Output Agent</text>

    <rect x="1255" y="692" width="240" height="54" rx="11" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.7"/>
    <text x="1375" y="725" text-anchor="middle" class="nodeTitle">Markdown Report</text>

    <line x1="1375" y1="322" x2="1375" y2="356" class="purpleFlow"/>
    <line x1="1375" y1="402" x2="1375" y2="436" class="purpleFlow"/>
    <line x1="1375" y1="498" x2="1375" y2="532" class="purpleFlow"/>
    <line x1="1375" y1="578" x2="1375" y2="612" class="purpleFlow"/>
    <line x1="1375" y1="658" x2="1375" y2="692" class="purpleFlow"/>
  </g>

  <!-- BOTTOM: Local Persistence -->
  <g filter="url(#cardShadow)">
    <rect x="455" y="802" width="690" height="110" rx="18" fill="#F9FAFB" stroke="#D5DAE2" stroke-width="1.8"/>
    <rect x="455" y="802" width="690" height="4" rx="2" fill="#2E9A55"/>
    <text x="510" y="840" class="section">Local Persistence</text>
    <text x="510" y="868" class="body">SQLite stores run history, timeline, debate messages, IR, reports and references.</text>
    <text x="510" y="895" class="tiny">API keys stay in browser localStorage and are not written to SQLite.</text>
  </g>

  <!-- Data/control arrows -->
  <path d="M385 278H500" class="blueFlow"/>
  <path d="M800 378V448" class="darkFlow"/>
  <path d="M1145 598H1220" class="blueFlow"/>
  <path d="M800 748V802" class="greenFlow"/>
  <path d="M385 795H455" class="dashFlow"/>
  <path d="M1100 276H1200V299H1255" class="dashFlow"/>
  <path d="M385 544H455" stroke="#CBD5E1" stroke-width="1.8" fill="none" marker-end="url(#arrowDark)"/>

  <!-- small route labels -->
  <rect x="412" y="258" width="52" height="24" rx="6" fill="#FFFFFF" opacity="0.95"/>
  <text x="438" y="274" text-anchor="middle" class="tiny">input</text>
  <rect x="1162" y="578" width="48" height="24" rx="6" fill="#FFFFFF" opacity="0.95"/>
  <text x="1186" y="594" text-anchor="middle" class="tiny">IR</text>
  <rect x="808" y="770" width="78" height="24" rx="6" fill="#FFFFFF" opacity="0.95"/>
  <text x="847" y="786" text-anchor="middle" class="tiny">persist</text>

  <text x="800" y="952" text-anchor="middle" class="tiny">K-Storm v1.6 · Local-first research topic brainstorming · MIT License</text>
</svg>
